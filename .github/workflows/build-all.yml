name: Build All Test Containers

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-postgresql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PostgreSQL
        uses: docker/build-push-action@v5
        with:
          context: ./postgresql
          push: true
          tags: ghcr.io/code-growers/fast_test_containers/postgresql-test:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tigerbeetle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate TigerBeetle data file
        run: |
          docker run --name tb-formatter --privileged \
            --entrypoint=/bin/sh ghcr.io/tigerbeetle/tigerbeetle:latest -c \
            "mkdir -p /data && /tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle"
          
          docker cp tb-formatter:/data/0_0.tigerbeetle ./tigerbeetle/
          docker rm tb-formatter

      - name: Build and push TigerBeetle
        uses: docker/build-push-action@v5
        with:
          context: ./tigerbeetle
          push: true
          tags: ghcr.io/code-growers/fast_test_containers/tigerbeetle-test:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
