name: Build All Test Containers

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  read-versions:
    runs-on: ubuntu-latest
    outputs:
      postgresql: ${{ steps.versions.outputs.postgresql }}
      keycloak: ${{ steps.versions.outputs.keycloak }}
      tigerbeetle: ${{ steps.versions.outputs.tigerbeetle }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions.json
        id: versions
        run: |
          echo "postgresql=$(jq -c '.postgresql' versions.json)" >> "$GITHUB_OUTPUT"
          echo "keycloak=$(jq -r '.keycloak' versions.json)" >> "$GITHUB_OUTPUT"
          echo "tigerbeetle=$(jq -r '.tigerbeetle' versions.json)" >> "$GITHUB_OUTPUT"

  build-postgresql:
    runs-on: ubuntu-latest
    needs: read-versions
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.read-versions.outputs.postgresql) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PostgreSQL ${{ matrix.version }}
        uses: docker/build-push-action@v5
        with:
          context: ./postgresql
          push: true
          tags: ghcr.io/code-growers/fast_test_containers/postgresql-test:${{ matrix.version }}
          build-args: PG_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tigerbeetle:
    runs-on: ubuntu-latest
    needs: read-versions
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.read-versions.outputs.tigerbeetle) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate TigerBeetle data file
        run: |
          docker run --name tb-formatter --privileged \
            --entrypoint=/bin/sh ghcr.io/tigerbeetle/tigerbeetle:${{ needs.read-versions.outputs.tigerbeetle }} -c \
            "mkdir -p /data && /tigerbeetle format --cluster=1 --replica=0 --replica-count=1 /data/0_0.tigerbeetle"

          docker cp tb-formatter:/data/0_0.tigerbeetle ./tigerbeetle/
          docker rm tb-formatter

      - name: Build and push TigerBeetle
        uses: docker/build-push-action@v5
        with:
          context: ./tigerbeetle
          push: true
          tags: ghcr.io/code-growers/fast_test_containers/tigerbeetle-test:${{ needs.read-versions.outputs.tigerbeetle }}
          build-args: TB_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-keycloak:
    runs-on: ubuntu-latest
    needs: read-versions
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        version: ${{ fromJson(needs.read-versions.outputs.keycloak) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Keycloak
        uses: docker/build-push-action@v5
        with:
          context: ./keycloak
          push: true
          tags: ghcr.io/code-growers/fast_test_containers/keycloak-test:${{ needs.read-versions.outputs.keycloak }}
          build-args: KC_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
